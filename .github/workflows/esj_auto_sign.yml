name: ESJ论坛自动水经验

on:
  schedule:
    # 每天北京时间6:00（UTC+8），对应UTC时间22:00
    - cron: '0 22 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sign-in:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          
      - name: 执行ESJ论坛水经验
        env:
          ESJ_USERNAME: ${{ secrets.ESJ_USERNAME }}
          ESJ_PASSWORD: ${{ secrets.ESJ_PASSWORD }}
        run: python src/esj_auto_sign.py
        
      - name: 检查执行结果
        if: always()
        run: |
          echo "水经验任务执行完成"
          echo "请查看上方日志了解详细执行情况"
